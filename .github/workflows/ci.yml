name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml') }}

      - name: fmt check
        run: cargo fmt --check

      - name: clippy
        run: cargo clippy -- -D warnings

      - name: unit + drift tests (V1)
        run: cargo test --test drift_suite_v0

      - name: unit + drift tests (V2)
        run: cargo test --test drift_suite_v2

      - name: verifier calibration v1 (golden fixture must PASS)
        run: |
          cargo build --bin verifier --quiet
          ./target/debug/verifier fixtures/temporal_collapse_001/director_loop_run.json

      # V2 drift suite (above) must green before this step runs.
      # The binary recomputes input_hash and output_hash from the artifact's
      # own fields and fails (exit 1) on any mismatch — hash drift in the
      # committed fixture is a hard CI break, not a warning.
      - name: verifier calibration v2 (golden fixture must PASS)
        run: |
          cargo build --bin verifier_v2 --quiet
          ./target/debug/verifier_v2 fixtures/v2/temporal_collapse_001/director_loop_run_v2.json

      - name: V2 hash integrity guarantee (calibration statement)
        run: |
          echo "V2 HASH INVARIANTS (enforced inside verifier_v2, gates 4 and 5):"
          echo "  input_hash  = SHA-256(serde_json::to_vec(InputHashPreimageV2))"
          echo "                preimage fields: v2_version, run_id, parent_run_id, protocol_sha, inputs"
          echo "  output_hash = SHA-256(serde_json::to_vec(OutputHashPreimageV2))"
          echo "                preimage fields: v2_version, run_id, parent_run_id, execution, audit, input_hash"
          echo "  Field order is frozen at struct definition. No JCS, no NFC, no runtime sorting."
          echo "  Any hash drift in the committed fixture exits 1 and breaks CI."
